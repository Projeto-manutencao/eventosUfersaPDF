name: Task / Chore
description: Tarefa técnica, refactor, config, docs, manutenção
title: "[TASK] "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Para tarefas que não são bug nem feature nova (ex: atualizar deps, ajustar config, refatorar).
  - type: dropdown
    id: type
    attributes:
      label: Tipo
      options:
        - refactor
        - docs
        - config
        - dependency-update
        - test
        - outro
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: O que precisa ser feito
      placeholder: Atualizar Django de 5.0 para 5.1...
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Por que / Contexto
      placeholder: Versão 5.0 chega ao EOL em...
  - type: textarea
    id: acceptance
    attributes:
      label: Critérios de aceite
      placeholder: |
        - [ ] Dependências atualizadas no requirements.txt
        - [ ] Testes passam
        - [ ] Changelog lido para breaking changes
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - Baixa
        - Média
        - Alta
    validations:
      required: true